openapi: 3.1.0
info:
  title: Genisys2 Kanban API
  description: |
    Slice 4 "Live Board" Kanban API.

    Provides board snapshot retrieval, card CRUD, card moves between columns,
    processor callback handling, real-time SSE board streams, and an immutable
    audit log query endpoint. All successful JSON responses are wrapped in a
    `{ data: { ... } }` envelope.

    ## Deterministic Demo Board
    The API seeds a deterministic demo board on startup via `seedBoard`. The demo board
    includes a **Processing** column (`in-review`) gated by the `manager-approval` processor.

    ## Processing Columns
    When a card enters a `Processing` column, the card's `processing_state` becomes
    `PROCESSING`, `is_editable` becomes `false`, and the system dispatches an async
    `on-enter` hook to the column's processor. The processor must POST back to the
    provided `callback_url` to unlock the card or move it to another column.

    ## Real-Time SSE Stream
    `GET /boards/{boardId}/stream` opens a Server-Sent Events connection. It emits
    `CARD_CREATED`, `CARD_UPDATED`, `CARD_MOVED`, and `BOARD_RELOAD` events. Clients
    may supply a `Last-Event-ID` header to resume from a disconnect. The server buffers
    the last 5 minutes of events per board. If the cursor is older than the buffer,
    a `BOARD_RELOAD` event is emitted so the client can fetch a fresh snapshot.

    ## Audit Log
    `GET /boards/{boardId}/audit-log` queries the immutable `event_log` table. Every
    card mutation (create, update, move, processing lifecycle) appends a row with
    `actor`, `action`, `category`, `lifecycle_event`, `from_column`, `to_column`,
    `payload_delta`, and `metadata`.
  version: "1.3.0"
  contact:
    name: Genisys2 Team
servers:
  - url: http://localhost:8080/api
    description: Local development

tags:
  - name: Boards
    description: Board-level operations and snapshots
  - name: Cards
    description: Card CRUD and movement operations
  - name: Callbacks
    description: Processor callback receiver for async hook completion
  - name: Events
    description: Real-time SSE board event stream
  - name: Audit
    description: Immutable audit log queries

paths:
  /boards:
    get:
      operationId: listBoards
      summary: List all boards
      description: Returns every board in the system with no pagination.
      tags:
        - Boards
      responses:
        "200":
          description: List of boards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBoardsResponse"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createBoard
      summary: Create a new board
      description: |
        Creates a new kanban board with a generated prefix and default three-column
        schema (Backlog → In Progress → Done).
      tags:
        - Boards
      responses:
        "201":
          description: Board created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBoardResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /boards/{boardId}/snapshot:
    get:
      operationId: getBoardSnapshot
      summary: Get full board snapshot
      description: |
        Returns the complete board state including board metadata and all visible cards.
        No pagination is applied.
      tags:
        - Boards
      parameters:
        - $ref: "#/components/parameters/BoardIdParam"
      responses:
        "200":
          description: Board snapshot retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /boards/{boardId}/stream:
    get:
      operationId: getBoardStream
      summary: Subscribe to board SSE events
      description: |
        Opens a Server-Sent Events connection for real-time card updates on the
        specified board.

        **Event types:**
        - `CARD_CREATED` — a new card was created.
        - `CARD_UPDATED` — a card's title, description, or processing state changed.
        - `CARD_MOVED` — a card moved to a different column.
        - `BOARD_RELOAD` — sent when `Last-Event-ID` cannot be resumed (buffer miss,
          cursor expired, or server reset). The client should fetch a fresh snapshot.

        **Replay / resume:**
        Pass `Last-Event-ID: <event-id>` on connect. The server replays all events
        after that ID that are still within the 5-minute buffer window. If the ID
        is missing or stale, a single `BOARD_RELOAD` event is emitted.

        **Connection lifecycle:**
        The stream stays open for up to 5 minutes (or until the client disconnects).
      tags:
        - Events
      parameters:
        - $ref: "#/components/parameters/BoardIdParam"
        - name: Last-Event-ID
          in: header
          required: false
          description: |
            Event ID from the last received SSE message. Used to replay missed events
            on reconnect.
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: SSE stream established
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /boards/{boardId}/audit-log:
    get:
      operationId: getAuditLog
      summary: Query board audit log
      description: |
        Queries the immutable `event_log` table for a given board. Results are ordered
        chronologically by `timestamp` then `event_id`. Supports cursor-based pagination.
      tags:
        - Audit
      parameters:
        - $ref: "#/components/parameters/BoardIdParam"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Maximum number of events to return.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 200
          description: |
            Pagination cursor in the format `{timestamp}|{event_id}`. Obtained from
            `next_cursor` in the previous response.
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: ISO 8601 lower bound (inclusive) for `timestamp`.
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: ISO 8601 upper bound (inclusive) for `timestamp`.
        - name: categories
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - routing
                - lifecycle
                - user_action
                - system
          style: form
          explode: true
          description: Filter by event category.
        - name: actions
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - CARD_CREATED
                - CARD_UPDATED
                - CARD_MOVED
                - MOVED
                - ACTION_TRIGGERED
                - PROCESSING_STARTED
                - PROCESSING_COMPLETED
                - PROCESSING_ERROR
                - ROLLUP_CHANGED
                - ADMIN_OVERRIDE
                - BOARD_RELOAD
          style: form
          explode: true
          description: Filter by action type.
        - name: card_uid
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter events to a single card.
      responses:
        "200":
          description: Audit log events retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /boards/{boardId}/cards:
    post:
      operationId: createCard
      summary: Create a new card
      description: |
        Creates a card on the specified board. The `current_status` must match a valid
        column uid defined in the board schema. The `display_id` is generated atomically
        using the board prefix and sequence counter (e.g. `S0-1`).
      tags:
        - Cards
      parameters:
        - $ref: "#/components/parameters/BoardIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCardRequest"
      responses:
        "201":
          description: Card created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCardResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /boards/{boardId}/cards/{cardId}:
    get:
      operationId: getCard
      summary: Get a single card
      description: Retrieves a card by its UUID within the specified board.
      tags:
        - Cards
      parameters:
        - $ref: "#/components/parameters/BoardIdParam"
        - $ref: "#/components/parameters/CardIdParam"
      responses:
        "200":
          description: Card retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCardResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: updateCard
      summary: Update card title or description
      description: |
        Partially updates a card. At least one of `title` or `description` must be
        provided. The request must include the current `version` for optimistic locking.
        If the server's version has advanced, a `409 Conflict` is returned with the
        authoritative card state so the client can refresh and retry.

        Cards in `PROCESSING` or `ERROR` state (`is_editable: false`) cannot be edited.
      tags:
        - Cards
      parameters:
        - $ref: "#/components/parameters/BoardIdParam"
        - $ref: "#/components/parameters/CardIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCardRequest"
      responses:
        "200":
          description: Card updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCardResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Optimistic locking conflict — card was modified by another user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardConflictResponse"

  /boards/{boardId}/cards/{cardId}/move:
    post:
      operationId: moveCard
      summary: Move a card to another column
      description: |
        Changes a card's `current_status` to the target column uid.

        **Blocked moves:** A card in `PROCESSING` state cannot be moved directly;
        the API returns `409 MOVE_BLOCKED`. The processor must call the callback
        endpoint with `move_to_column` to transition the card.

        **can-exit hook:** Before the move, a synchronous `can-exit` hook is dispatched
        to the column's processor with a strict 3-second timeout. If the processor
        returns `allowed: false`, the move is rejected with `409 Conflict`.
        The target column must exist in the board schema. The card `version` is
        incremented automatically on a successful move.
      tags:
        - Cards
      parameters:
        - $ref: "#/components/parameters/BoardIdParam"
        - $ref: "#/components/parameters/CardIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveCardRequest"
      responses:
        "200":
          description: Card moved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoveCardResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Move blocked by processor `can-exit` hook, card is in `PROCESSING` state,
            or optimistic locking conflict.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoveCardBlockedResponse"
        "500":
          description: Internal move failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /boards/{boardId}/cards/{cardId}/action:
    post:
      operationId: triggerAction
      summary: Trigger a card action
      description: |
        Placeholder action endpoint. Validates the card exists and that the provided
        `version` matches the current server version. Returns the card unchanged with
        status `completed`.
      tags:
        - Cards
      parameters:
        - $ref: "#/components/parameters/BoardIdParam"
        - $ref: "#/components/parameters/CardIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriggerActionRequest"
      responses:
        "200":
          description: Action accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriggerActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /callbacks/{token}:
    post:
      operationId: processorCallback
      summary: Processor callback receiver
      description: |
        Receives asynchronous completion callbacks from processors. When a card enters
        a `Processing` column, the system POSTs an `on-enter` hook to the processor
        with a unique `callback_url` pointing to this endpoint.

        **Token lifecycle:**
        - The token is generated as a UUID and stored in `callback_tokens` with a
          10-minute `expires_at` deadline.
        - The token is deleted atomically on successful consumption.
        - A replay-protected in-memory set (`consumedTokens`) rejects reuse of
          already-deleted tokens with `409 CALLBACK_TOKEN_REPLAYED`.

        **Payload semantics:**
        - `status: success` — unlocks the card (`processing_state: IDLE`,
          `is_editable: true`), applies optional `payload_updates`, and optionally
          moves the card to `move_to_column`.
        - `status: error` — sets `processing_state: ERROR`, `is_editable: false`.

        **Auth:** Requires `Authorization: Bearer <token>` header. In Slice 3, HMAC
        signature verification is deferred; bearer token presence is validated but
        not cryptographically verified.
      tags:
        - Callbacks
      parameters:
        - name: token
          in: path
          required: true
          description: UUID callback token issued during `on-enter` dispatch
          schema:
            type: string
            format: uuid
        - name: Authorization
          in: header
          required: true
          description: Bearer token header (`Bearer <token>`)
          schema:
            type: string
            pattern: "^Bearer\\s+.+$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessorCallbackRequest"
      responses:
        "200":
          description: Callback consumed successfully; card updated and/or moved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessorCallbackResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid or missing Authorization header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Callback token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallbackTokenRejectedResponse"
        "409":
          description: Callback token has already been used (replay protection)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallbackTokenRejectedResponse"
        "410":
          description: Callback token has expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallbackTokenRejectedResponse"
        "500":
          description: Internal callback processing error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    BoardEntity:
      type: object
      required:
        - uid
        - title
        - prefix
        - schema
        - permissions
        - created_at
        - updated_at
      properties:
        uid:
          type: string
          format: uuid
          description: Board unique identifier
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Board display title
        prefix:
          type: string
          pattern: "^[A-Z][A-Z0-9]{0,9}$"
          description: |
            Board prefix used for display ID generation.
            1-10 uppercase alphanumeric characters starting with a letter.
        schema:
          $ref: "#/components/schemas/BoardSchemaDocument"
        permissions:
          $ref: "#/components/schemas/BoardPermissions"
        created_at:
          type: string
          format: date-time
          description: ISO 8601 creation timestamp
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 last update timestamp

    BoardSchemaDocument:
      type: object
      required:
        - columns
      properties:
        columns:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/BoardColumn"

    BoardColumn:
      type: object
      required:
        - uid
        - title
        - type
        - processor_id
        - exit_logic
        - order
      properties:
        uid:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[A-Za-z0-9:_-]+$"
          description: Column unique uid (letters, numbers, :, _, -)
        title:
          type: string
          minLength: 1
          maxLength: 120
          description: Column display title
        type:
          type: string
          enum:
            - Normal
            - Processing
          description: |
            Column type. `Processing` columns lock cards and dispatch async `on-enter`
            hooks to their configured processor.
        processor_id:
          type: string
          minLength: 1
          maxLength: 120
          description: Processor identifier for this column
        exit_logic:
          type: object
          additionalProperties:
            type: string
            minLength: 1
          description: |
            Map of exit keys to target column uids. Processing columns must define
            at least one exit route.
        order:
          type: integer
          minimum: 0
          description: Display order within the board

    BoardPermissions:
      type: object
      required:
        - read
        - write
      properties:
        read:
          type: array
          items:
            type: string
            minLength: 1
          default: []
        write:
          type: array
          items:
            type: string
            minLength: 1
          default: []

    CardEntity:
      type: object
      required:
        - uid
        - board_uid
        - display_id
        - title
        - description
        - version
        - processing_state
        - is_editable
        - payload
        - current_status
        - created_at
        - updated_at
      properties:
        uid:
          type: string
          format: uuid
          description: Card unique identifier
        board_uid:
          type: string
          format: uuid
          description: Parent board UUID
        display_id:
          type: string
          pattern: "^[A-Z][A-Z0-9]{0,9}-[1-9]\\d*$"
          description: Human-readable display ID (e.g. `S0-1`)
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Card title
        description:
          type: string
          maxLength: 20000
          nullable: true
          description: Optional card description
        version:
          type: integer
          minimum: 1
          description: Optimistic concurrency version (auto-incremented)
        processing_state:
          type: string
          enum:
            - IDLE
            - PROCESSING
            - ERROR
          description: |
            Current processing state. `PROCESSING` means an async hook is in flight.
            `ERROR` means the processor reported failure. Both lock the card
            (`is_editable: false`).
        is_editable:
          type: boolean
          description: |
            Whether the card is currently editable. Automatically `false` when
            `processing_state` is `PROCESSING` or `ERROR`.
        payload:
          type: object
          additionalProperties: true
          description: Arbitrary JSON payload
        current_status:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[A-Za-z0-9:_-]+$"
          description: Current column uid
        created_at:
          type: string
          format: date-time
          description: ISO 8601 creation timestamp
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 last update timestamp

    ProcessorRegistryEntity:
      type: object
      required:
        - processor_id
        - name
        - base_url
        - health_endpoint
        - hooks
        - sla_seconds
        - max_sla_seconds
        - auth_type
        - hmac_secret
        - status
        - created_at
        - updated_at
      properties:
        processor_id:
          type: string
          minLength: 1
          maxLength: 120
        name:
          type: string
          minLength: 1
          maxLength: 200
        base_url:
          type: string
          format: uri
          description: Base URL for all processor hooks
        health_endpoint:
          type: string
          minLength: 1
          maxLength: 200
          default: "/health"
        hooks:
          type: array
          minItems: 1
          items:
            type: string
            enum:
              - on-enter
              - on-update
              - on-action
              - can-exit
              - on-exit
        sla_seconds:
          type: integer
          minimum: 1
          maximum: 86400
          description: Target SLA for hook completion
        max_sla_seconds:
          type: integer
          minimum: 1
          maximum: 86400
          description: Hard maximum SLA; must be >= sla_seconds
        auth_type:
          type: string
          enum:
            - bearer
            - oauth2
            - none
        auth_config:
          type: object
          additionalProperties: true
          nullable: true
          description: Processor-specific auth configuration
        hmac_secret:
          type: string
          minLength: 1
          description: |
            HMAC secret for callback signature verification. In Slice 3 this is
            populated with a placeholder (`temp-secret-ignore`) and actual HMAC
            enforcement is deferred to Slice 6.
        status:
          type: string
          enum:
            - healthy
            - degraded
            - unhealthy
            - unknown
          description: Last known health status from polling
        last_health_check:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp of the last health check
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CallbackTokenEntity:
      type: object
      required:
        - token
        - card_uid
        - processor_id
        - hook
        - idempotency_key
        - context
        - expires_at
        - created_at
      properties:
        token:
          type: string
          format: uuid
        card_uid:
          type: string
          format: uuid
        processor_id:
          type: string
        hook:
          type: string
          enum:
            - on-enter
            - on-action
        idempotency_key:
          type: string
          format: uuid
        context:
          type: object
          additionalProperties: true
          description: Hook-specific context (e.g. previous_status)
        expires_at:
          type: string
          format: date-time
          description: Token expiration deadline
        created_at:
          type: string
          format: date-time

    SnapshotData:
      type: object
      required:
        - board
        - cards
      properties:
        board:
          $ref: "#/components/schemas/BoardEntity"
        cards:
          type: array
          items:
            $ref: "#/components/schemas/CardEntity"

    SnapshotResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/SnapshotData"

    ListBoardsResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - boards
          properties:
            boards:
              type: array
              items:
                $ref: "#/components/schemas/BoardEntity"

    CreateBoardResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - board
          properties:
            board:
              $ref: "#/components/schemas/BoardEntity"

    CreateCardRequest:
      type: object
      required:
        - title
        - current_status
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Card title
        description:
          type: string
          maxLength: 20000
          nullable: true
          description: Optional description
        current_status:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[A-Za-z0-9:_-]+$"
          description: Target column uid for the new card
        payload:
          type: object
          additionalProperties: true
          description: Optional JSON payload

    CreateCardResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - card
          properties:
            card:
              $ref: "#/components/schemas/CardEntity"

    GetCardResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - card
          properties:
            card:
              $ref: "#/components/schemas/CardEntity"

    UpdateCardRequest:
      type: object
      required:
        - version
      properties:
        version:
          type: integer
          minimum: 1
          description: Current optimistic-lock version from the card entity
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: New card title
        description:
          type: string
          maxLength: 20000
          nullable: true
          description: New card description

    UpdateCardResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - card
          properties:
            card:
              $ref: "#/components/schemas/CardEntity"

    MoveCardRequest:
      type: object
      required:
        - to_column_uid
      properties:
        to_column_uid:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[A-Za-z0-9:_-]+$"
          description: Destination column uid

    MoveCardResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - card
          properties:
            card:
              $ref: "#/components/schemas/CardEntity"

    TriggerActionRequest:
      type: object
      required:
        - action
        - version
      properties:
        action:
          type: string
          minLength: 1
          maxLength: 200
          description: Action identifier to trigger
        version:
          type: integer
          minimum: 1
          description: Current optimistic-lock version

    TriggerActionResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - card
            - status
          properties:
            card:
              $ref: "#/components/schemas/CardEntity"
            status:
              type: string
              enum:
                - completed
                - accepted

    ProcessorCallbackRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - success
            - error
          description: Processor-reported completion status
        payload_updates:
          type: object
          description: Optional partial card updates to apply on success
          properties:
            title:
              type: string
              minLength: 1
              maxLength: 200
            description:
              type: string
              maxLength: 20000
              nullable: true
            payload:
              type: object
              additionalProperties: true
            is_editable:
              type: boolean
        move_to_column:
          type: string
          nullable: true
          minLength: 1
          maxLength: 64
          pattern: "^[A-Za-z0-9:_-]+$"
          description: |
            If provided on `status: success`, moves the card to this column uid
            after unlocking.
        error_message:
          type: string
          minLength: 1
          maxLength: 500
          description: Required when `status` is `error`

    ProcessorCallbackResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - card
          properties:
            card:
              $ref: "#/components/schemas/CardEntity"

    CallbackTokenRejectedResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              enum:
                - CALLBACK_TOKEN_MISSING
                - CALLBACK_TOKEN_EXPIRED
                - CALLBACK_TOKEN_REPLAYED
            message:
              type: string

    CardConflictResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
            - details
          properties:
            code:
              type: string
              enum:
                - CONFLICT
            message:
              type: string
              description: Human-readable conflict explanation
            details:
              type: object
              required:
                - current_version
                - card
              properties:
                current_version:
                  type: integer
                  minimum: 1
                card:
                  $ref: "#/components/schemas/CardEntity"

    MoveCardBlockedResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              enum:
                - MOVE_BLOCKED
            message:
              type: string
              description: Processor-provided reason for blocking the move
            details:
              type: object
              properties:
                hook:
                  type: string
                  enum:
                    - can-exit

    EventLogRow:
      type: object
      required:
        - event_id
        - card_uid
        - board_uid
        - timestamp
        - actor
        - action
        - category
        - lifecycle_event
        - from_column
        - to_column
      properties:
        event_id:
          type: string
          minLength: 1
          description: Unique event identifier (UUID)
        card_uid:
          type: string
          format: uuid
          description: Associated card UUID
        board_uid:
          type: string
          format: uuid
          nullable: true
          description: Associated board UUID
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 event timestamp
        actor:
          type: string
          minLength: 1
          maxLength: 200
          description: Entity that performed the action (e.g. `user:anonymous`, `system:processor`)
        action:
          type: string
          enum:
            - CARD_CREATED
            - CARD_UPDATED
            - CARD_MOVED
            - MOVED
            - ACTION_TRIGGERED
            - PROCESSING_STARTED
            - PROCESSING_COMPLETED
            - PROCESSING_ERROR
            - ROLLUP_CHANGED
            - ADMIN_OVERRIDE
            - BOARD_RELOAD
          description: Action type
        category:
          type: string
          enum:
            - routing
            - lifecycle
            - user_action
            - system
          description: Event category
        lifecycle_event:
          type: string
          enum:
            - PROCESSING_STARTED
            - PROCESSING_COMPLETED
            - PROCESSING_ERROR
          nullable: true
          description: Lifecycle detail when category is `lifecycle`
        from_column:
          type: string
          minLength: 1
          maxLength: 64
          nullable: true
          description: Source column uid for move events
        to_column:
          type: string
          minLength: 1
          maxLength: 64
          nullable: true
          description: Destination column uid for move events
        idempotency_key:
          type: string
          format: uuid
          nullable: true
          description: Idempotency key for idempotent operations
        payload_delta:
          type: object
          additionalProperties: true
          nullable: true
          description: JSON patch-like delta of what changed
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: Arbitrary contextual metadata

    AuditLogResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - events
            - next_cursor
          properties:
            events:
              type: array
              items:
                $ref: "#/components/schemas/EventLogRow"
              description: Chronologically ordered audit events
            next_cursor:
              type: string
              minLength: 1
              maxLength: 200
              nullable: true
              description: Cursor for the next page, or null when exhausted

    BoardReloadEventData:
      type: object
      required:
        - event_id
        - board_uid
        - reason
        - timestamp
      properties:
        event_id:
          type: string
          minLength: 1
        board_uid:
          type: string
          format: uuid
        reason:
          type: string
          enum:
            - CURSOR_EXPIRED
            - BUFFER_MISS
            - SERVER_RESET
          description: Why a full reload was requested
        timestamp:
          type: string
          format: date-time

    ApiError:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              minLength: 1
              description: Machine-readable error code
            message:
              type: string
              minLength: 1
              description: Human-readable error message
            details:
              type: object
              additionalProperties: true
              description: Optional structured error details

  parameters:
    BoardIdParam:
      name: boardId
      in: path
      required: true
      description: Board UUID
      schema:
        type: string
        format: uuid

    CardIdParam:
      name: cardId
      in: path
      required: true
      description: Card UUID
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request parameters or body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error:
              code: INVALID_PARAMS
              message: Invalid path parameters
              details:
                issues:
                  - path: ["boardId"]
                    message: Invalid uuid

    NotFound:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error:
              code: BOARD_NOT_FOUND
              message: Board not found

    Conflict:
      description: Optimistic locking conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CardConflictResponse"

    InternalError:
      description: Unexpected internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
